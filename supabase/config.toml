# Supabase CLI configuration
# Docs: https://supabase.com/docs/guides/local-development/cli/config
# 1. Replace `project_id` with your Supabase project ID (from dashboard URL).
# 2. The key fields below are mostly for local `supabase start`; hosted project keys live in .env.
# 3. After filling placeholders, run: supabase login && supabase link --project-ref <project_id>

project_id = "nlplamyxiqvxemzewkfh"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Example external OAuth provider (fill in via Supabase Dashboard > Auth).
[auth.external.github]
enabled = false
client_id = ""
secret = ""

[analytics]
enabled = false
