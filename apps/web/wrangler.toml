name = "schema-studio"
compatibility_date = "2026-05-27"
compatibility_flags = ["nodejs_compat"]

# Nitro's cloudflare-module preset generates .output/server/wrangler.json
# with the Worker entrypoint and static assets binding.
# Deploy with: wrangler deploy --config .output/server/wrangler.json

# Environment variables for production
# Set runtime variables in Cloudflare Dashboard > Workers & Pages > schema-studio
# > Settings > Variables & Secrets.
# [env.production.vars]
# SUPABASE_URL = ""
# SUPABASE_SERVICE_ROLE_KEY = ""
# VITE_SUPABASE_URL = ""
# VITE_SUPABASE_ANON_KEY = ""
